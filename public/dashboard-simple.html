<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - App Financeiro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; padding: 20px 30px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header h1 { color: #333; font-size: 24px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-name { color: #666; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .logout-btn:hover { background: #c82333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card h3 { color: #333; margin-bottom: 15px; font-size: 18px; }
        .stat-value { font-size: 32px; font-weight: bold; color: #667eea; margin-bottom: 5px; }
        .stat-label { color: #666; font-size: 14px; }
        .positive { color: #28a745; }
        .negative { color: #dc3545; }
        .menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .menu-btn { background: white; border: 2px solid #e1e5e9; padding: 20px; border-radius: 10px; cursor: pointer; text-align: center; transition: all 0.3s; }
        .menu-btn:hover { border-color: #667eea; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .menu-btn i { font-size: 24px; margin-bottom: 10px; display: block; }
        .hidden { display: none; }
        .loading { text-align: center; padding: 50px; color: white; font-size: 18px; }
        .error { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>
    <div id="loading" class="loading">Carregando...</div>
    
    <div id="dashboard" class="container hidden">
        <div class="header">
            <h1>💰 App Financeiro</h1>
            <div class="user-info">
                <span class="user-name" id="userName">Usuário</span>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h3>📈 Total Receitas</h3>
                <div class="stat-value positive" id="totalReceitas">R$ 0,00</div>
                <div class="stat-label">Este mês</div>
            </div>
            
            <div class="card">
                <h3>📉 Total Despesas</h3>
                <div class="stat-value negative" id="totalDespesas">R$ 0,00</div>
                <div class="stat-label">Este mês</div>
            </div>
            
            <div class="card">
                <h3>💵 Saldo</h3>
                <div class="stat-value" id="saldo">R$ 0,00</div>
                <div class="stat-label">Disponível</div>
            </div>
            
            <div class="card">
                <h3>📊 Economia</h3>
                <div class="stat-value" id="economia">0%</div>
                <div class="stat-label">Do total</div>
            </div>
        </div>
        
        <div class="card">
            <h3>🚀 Menu Rápido</h3>
            <div class="menu">
                <div class="menu-btn" onclick="alert('Receitas - Em desenvolvimento')">
                    <span style="font-size: 24px;">📈</span>
                    <div>Receitas</div>
                </div>
                <div class="menu-btn" onclick="alert('Despesas - Em desenvolvimento')">
                    <span style="font-size: 24px;">📉</span>
                    <div>Despesas</div>
                </div>
                <div class="menu-btn" onclick="alert('Insights - Em desenvolvimento')">
                    <span style="font-size: 24px;">🤖</span>
                    <div>Insights</div>
                </div>
                <div class="menu-btn" onclick="alert('Configurações - Em desenvolvimento')">
                    <span style="font-size: 24px;">⚙️</span>
                    <div>Configurações</div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="error" class="container hidden">
        <div class="error">
            <strong>Erro:</strong> <span id="errorMessage"></span>
        </div>
        <button onclick="logout()" style="margin-top: 20px; padding: 10px 20px;">Voltar para Login</button>
    </div>

    <script src="/assets/js/api-config.js"></script>
    <script>
        // Verificar autenticação imediatamente
        (function() {
            const token = localStorage.getItem('app_token');
            const user = localStorage.getItem('app_user');
            
            if (!token || !user) {
                // Não está autenticado, redirecionar para login
                window.location.replace('/');
                return;
            }
            
            // Mostrar dashboard
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            
            // Carregar dados do usuário
            const userData = JSON.parse(user);
            document.getElementById('userName').textContent = userData.nome || userData.email;
            
            // Carregar dados do dashboard
            loadDashboard();
        })();
        
        async function loadDashboard() {
            try {
                const data = await window.appAPI.getDashboard();
                
                if (data.success) {
                    const { totalReceitas, totalDespesas, saldo } = data.data;
                    const economia = totalReceitas > 0 ? ((totalReceitas - totalDespesas) / totalReceitas * 100).toFixed(1) : 0;
                    
                    document.getElementById('totalReceitas').textContent = formatCurrency(totalReceitas);
                    document.getElementById('totalDespesas').textContent = formatCurrency(totalDespesas);
                    document.getElementById('saldo').textContent = formatCurrency(saldo);
                    document.getElementById('economia').textContent = economia + '%';
                }
            } catch (error) {
                console.error('Erro ao carregar dashboard:', error);
            }
        }
        
        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value);
        }
        
        function logout() {
            window.appAPI.logout();
            window.location.replace('/');
        }
    </script>
</body>
</html>
