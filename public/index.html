<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a84ff">
    <title>Login - App Financeiro</title>
    <link rel="manifest" href="manifest.json">
    <script src="assets/js/theme.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">
    <button class="btn-theme floating-theme" type="button" data-theme-toggle>
        <span data-theme-label>Tema</span>
    </button>

    <div class="login-container">
        <div class="login-card liquid-login-card">
            <div class="logo">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="2" y="6" width="20" height="14" rx="3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 10h20" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M22 14h-4a2 2 0 0 0 0 4h4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6 6V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>App Financeiro</h1>
            <p class="subtitle">Controle suas finanças de forma inteligente</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="login">Login</label>
                    <input type="text" id="login" required placeholder="admin@finances.com">
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required placeholder="••••••">
                </div>
                
                <button type="submit" class="btn-primary" id="btnLogin">
                    Entrar
                </button>
                
                <div class="alert" id="alert" style="display: none;"></div>
            </form>

            <div class="login-credits" aria-label="Créditos">
                <p>Created by Marcelo Torres Alves - 2026</p>
                <p>Todos os direitos reservados.</p>
            </div>
        </div>
    </div>
    
    <script src="assets/js/app.js"></script>
</body>
</html>
